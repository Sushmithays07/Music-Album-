<div id="recentList"></div>

<div id="favoriteList"></div>

</div>

<footer class="index-footer">
© 2026 Chinni Raagam | Where Every Song Tells a Story
</footer>

</div>

<script>

const musicData = {

HiNanna:["Gaaju Bomma","Oo Chedhu Nijam","Ammaadi"],
melodies:["Melody Song 1","Melody Song 2"],
sad:["Sad Song 1"],
soul:["Soul Song 1"],
beats:["Beat Song 1"],
motivation:["Motivation Song 1"],
devotional:["Devotional Song 1"],
friendship:["Friendship Song 1"],
family:["Family Song 1"]

};

function searchMusic(){

let input=document.getElementById("searchInput").value.toLowerCase();
let results=document.getElementById("searchResults");

results.innerHTML="";

if(input==="") return;

for(let album in musicData){

musicData[album].forEach(song=>{

if(song.toLowerCase().includes(input)){

let div=document.createElement("div");

div.className="result-item";
div.innerText=song+" ("+album+")";

div.onclick=function(){
window.location.href="album.html?album="+album;
};

results.appendChild(div);

}

});

}

}



/* LOGIN */

function loginUser(){

let name=document.getElementById("username").value;

if(name===""){
alert("Enter name");
return;
}

localStorage.setItem("user",name);

document.getElementById("welcomeUser").innerText="Welcome "+name+" 👋";

loadFavorites();

}




window.onload=function(){

let user=localStorage.getItem("user");

if(user){
document.getElementById("welcomeUser").innerText="Welcome "+user+" 🤗";
loadFavorites();
}

};
function loadRecent(){

let recent = JSON.parse(localStorage.getItem("recentSongs")) || [];

let container = document.getElementById("recentList");

if(!container) return;

container.innerHTML="";

recent.forEach(song=>{

let div=document.createElement("div");

div.innerText="🎵 "+song;

container.appendChild(div);

});

}

loadRecent();



</script>
</body>

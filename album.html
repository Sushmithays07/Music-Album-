<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chinni Music Player 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="player-card">

<div class="back-row">
<button class="back-btn" onclick="location.href='home.html'">⬅ Back</button>
</div>

<div class="center-content">

<img src="Gaaju.png" id="album">

<div id="currentLine" class="current-line">
Press Play 🎵
</div>

<h1 id="songTitle"></h1>
<button onclick="addFavorite(document.getElementById('songTitle').textContent)">
❤️ Add to Favorites
</button>

<p id="albumName" class="movie-name"></p>

<input type="range" id="progress" value="0" min="0" max="100">

<div class="controls">
<button id="prevBtn">⏮</button>
<button id="playBtn" class="play-btn">▶</button>
<button id="nextBtn">⏭</button>
</div>

</div>

</div>

<div class="lyrics-card">
<div class="lyrics-container"></div>
</div>

</div>

<audio id="song"></audio>

<script src="script.js"></script>

</body>
</html>
